<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#11091d">
  <meta name="description" content="Questlog — a responsive D&D session blog and social app.">
  <title>Questlog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="noise"></div><div class="orb orb-a"></div><div class="orb orb-b"></div>
  <header class="topbar">
    <button class="brand" data-route="home" aria-label="Questlog home"><span class="brand-die">20</span><span><b>Questlog</b><small>Chronicles worth keeping</small></span></button>
    <label class="global-search"><span>⌕</span><input id="globalSearch" type="search" placeholder="Search tales, heroes, campaigns…"><kbd>⌘ K</kbd></label>
    <div class="top-actions"><span id="p2pStatus" class="p2p-status">Connecting…</span>
      <button class="icon-button" id="notificationsButton" title="Notifications" aria-label="Notifications">✧<span id="notificationBadge" class="badge hidden">0</span></button>
      <button class="primary-button" data-action="open-composer">＋ New tale</button>
      <button class="profile-chip" id="profileButton" data-route="profile"><span id="topAvatar" class="avatar avatar-sm"></span><span id="topName">Guest</span></button>
    </div>
  </header>

  <div class="app-grid">
    <aside class="sidebar left-sidebar">
      <nav id="desktopNav" class="main-nav">
        <button data-route="home"><span>⌂</span>Home</button>
        <button data-route="campaigns"><span>⚔</span>Campaigns</button>
        <button data-route="lore"><span>◈</span>Lore</button>
        <button data-route="discover"><span>✦</span>Discover</button>
        <button data-route="saved"><span>▣</span>Saved</button>
      </nav>
      <section class="sidebar-section">
        <div class="section-title"><span>Your campaigns</span><button class="tiny-add" data-action="new-campaign" title="Create campaign">＋</button></div>
        <div id="campaignMiniList" class="mini-list"></div>
      </section>
      <section class="sidebar-card dice-card">
        <div class="floating-d20" data-action="quick-roll"><span id="headerDieValue">20</span></div>
        <div><b>Quick roll</b><small>Tap the die for a d20</small></div>
      </section>
      <footer class="sidebar-footer">Posts live for 48 hours · No backend account required</footer>
    </aside>

    <main id="appView" class="view" tabindex="-1"></main>

    <aside class="sidebar right-sidebar">
      <section class="sidebar-card account-summary" id="accountSummary"></section>
      <section class="sidebar-section">
        <div class="section-title"><span>Upcoming sessions</span><button data-route="campaigns">See all</button></div>
        <div id="upcomingList" class="stack-list"></div>
      </section>
      <section class="sidebar-section">
        <div class="section-title"><span>People you follow</span><button data-route="discover">Discover</button></div>
        <div id="followingMiniList" class="stack-list"></div>
      </section>
    </aside>
  </div>

  <nav class="mobile-nav" id="mobileNav">
    <button data-route="home"><span>⌂</span><small>Home</small></button>
    <button data-route="campaigns"><span>⚔</span><small>Campaigns</small></button>
    <button class="mobile-create" data-action="open-composer">＋</button>
    <button data-route="discover"><span>✦</span><small>Discover</small></button>
    <button data-route="profile"><span>♙</span><small>Profile</small></button>
  </nav>

  <div id="modalRoot"></div>
  <div id="menuRoot"></div>
  <div id="toast" class="toast" role="status"></div>
  <script type="module" src="script.js"></script>
</body>
</html>
